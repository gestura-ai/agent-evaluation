[advisories]
# Treat unmaintained crates as informational rather than errors — many
# transitive deps are unmaintained but still safe for our threat model.
unmaintained = "warn"
unsound = "warn"

# Add per-advisory ignores here when a known-safe advisory affects a
# transitive dependency we cannot update immediately.
# Format:
#   [[advisories.ignore]]
#   id = "RUSTSEC-YYYY-NNNN"
#   reason = "…"
