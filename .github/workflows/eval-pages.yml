name: Eval Pages

on:
  # Triggered by gestura-app's release workflow via repository_dispatch.
  # Runs on main (satisfies the github-pages environment branch rule) and
  # receives the new tag in client_payload.tag.
  repository_dispatch:
    types: [gestura-released]
  # Deploy after every published release in this repo — the release event
  # runs in the tag context (v*), which the github-pages environment also accepts.
  release:
    types: [published]
  # Allow manual re-runs: re-evaluate after an agent update, test a specific
  # set of families, or adjust trial / delay parameters without cutting a release.
  workflow_dispatch:
    inputs:
      families:
        description: >
          Comma-separated agent families to evaluate.
          Each family expands to full, sandboxed, and iterative profiles.
        required: false
        default: 'gestura,claude-code,opencode'
        type: string
      trials:
        description: 'Number of trials per variation (scores averaged, pass/fail by majority).'
        required: false
        default: '3'
        type: string
      variation_delay_ms:
        description: 'Milliseconds to pause between variation subprocess calls.'
        required: false
        default: '3000'
        type: string
      gestura_tag:
        description: >
          gestura-app release tag to install (e.g. v0.11.0).
          Defaults to GESTURA_CLI_TAG repo variable, then v0.11.2.
        required: false
        default: ''
        type: string
      ref:
        description: 'agent-eval ref to build from (branch, tag, or SHA). Defaults to HEAD.'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pages: write      # required to deploy to GitHub Pages
  id-token: write   # required by the OIDC token used by actions/deploy-pages

concurrency:
  group: eval-pages-deploy
  # Never cancel an in-progress run — the suite takes 4-6 hours and killing it
  # mid-run wastes all accumulated work.  Incoming runs queue instead.
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: stable

jobs:
  # ── Resolve parameters and build the family matrix ────────────────────────────
  setup:
    name: Resolve parameters
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      trials: ${{ steps.resolve.outputs.trials }}
      delay: ${{ steps.resolve.outputs.delay }}
      gestura_tag: ${{ steps.resolve.outputs.gestura_tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve suite parameters
        id: resolve
        run: |
          families="${{ github.event.inputs.families || 'gestura,claude-code,opencode' }}"
          trials="${{ github.event.inputs.trials || '3' }}"
          delay="${{ github.event.inputs.variation_delay_ms || '3000' }}"
          gestura_tag="${{ github.event.client_payload.tag || github.event.inputs.gestura_tag || vars.GESTURA_CLI_TAG || 'v0.11.2' }}"
          ref="${{ github.event.inputs.ref || github.sha }}"

          # Convert comma-separated families into a JSON array for the matrix strategy.
          matrix=$(echo "$families" | tr ',' '\n' | jq -R . | jq -sc '{"family": .}')

          echo "matrix=${matrix}"           >> "$GITHUB_OUTPUT"
          echo "trials=${trials}"           >> "$GITHUB_OUTPUT"
          echo "delay=${delay}"             >> "$GITHUB_OUTPUT"
          echo "gestura_tag=${gestura_tag}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}"                 >> "$GITHUB_OUTPUT"

          echo "Trigger      : ${{ github.event_name }}"
          echo "Families     : ${families}"
          echo "Matrix       : ${matrix}"
          echo "Trials       : ${trials}"
          echo "Delay ms     : ${delay}"
          echo "Gestura tag  : ${gestura_tag}"
          echo "Ref          : ${ref}"

  # ── Build agent-eval binary once, share across all matrix jobs ─────────────────
  # Compiling Rust peaks at 3–4 GB of RAM.  Building here — before any eval jobs
  # start — means the 7 GB runner is free for agent subprocess invocations during
  # the eval phase.  The compiled binary is uploaded as an artifact and downloaded
  # by each matrix job and the aggregate job.
  build:
    name: Build agent-eval
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            libasound2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-eval-pages-ubuntu-22.04
          cache-targets: true

      - name: Build agent-eval
        run: cargo build --release

      - name: Upload agent-eval binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-binary
          path: target/release/agent-eval
          retention-days: 1

  # ── Per-family evaluation — runs in parallel, one job per family ──────────────
  # One family: 3 modes × 14 scenarios × 3 variations × 3 trials ≈ 40–90 min.
  # 150-min timeout gives a comfortable margin; families run concurrently so
  # total wall-clock time matches the slowest family (~40–90 min) rather than
  # the sum (~2.5–3.5 h) that caused the "runner lost communication" crash.
  run-eval:
    name: Evaluate ${{ matrix.family }}
    needs: [setup, build]
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      # Don't abort other families if one fails — partial results are still useful.
      fail-fast: false
    env:
      # ── Mirror the Containerfile runtime env vars ────────────────────────────
      GESTURA_DISABLE_KEYCHAIN: "1"
      AUGMENT_DISABLE_AUTO_UPDATE: "1"
      CODEX_HOME: "/home/runner/.codex"
      RUST_LOG: "warn"
      # ── Redirect Node.js CLI home dirs to /tmp so logs and caches don't
      # accumulate across hundreds of subprocess invocations and fill the
      # runner's 14 GB disk.  These vars are inherited by every subprocess
      # because cli_runner.rs inherits the parent env.
      CLAUDE_HOME: "/tmp/claude-eval"
      XDG_CACHE_HOME: "/tmp/xdg-cache"
      XDG_DATA_HOME: "/tmp/xdg-data"
      # ── API keys — secrets are only accessible at job/step level, not
      # workflow level. Defined here so every step and subprocess inherits them.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GESTURA_ANTHROPIC_API_KEY: ${{ secrets.GESTURA_ANTHROPIC_API_KEY }}

    steps:
      - name: Verify required secrets
        run: |
          failed=0
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is empty or not set."
            failed=1
          else
            echo "ANTHROPIC_API_KEY: set (${#ANTHROPIC_API_KEY} chars)"
          fi
          if [ -z "$GESTURA_ANTHROPIC_API_KEY" ]; then
            echo "ERROR: GESTURA_ANTHROPIC_API_KEY is empty or not set."
            echo "Add it at: Settings → Secrets and variables → Actions → Repository secrets"
            failed=1
          else
            echo "GESTURA_ANTHROPIC_API_KEY: set (${#GESTURA_ANTHROPIC_API_KEY} chars)"
          fi
          if [ "$failed" -eq 1 ]; then exit 1; fi

      # ── Swap space — GitHub ubuntu-22.04 runners have 7 GB RAM with no swap.
      # Node.js CLIs (claude, opencode) have higher per-invocation memory
      # overhead than native binaries.  6 GB of swap prevents the OOM killer
      # from terminating the runner mid-suite.
      # ── Swap space — GitHub ubuntu-22.04 runners have 7 GB RAM with no swap.
      # /swapfile is already in use by the runner image (fallocate fails with
      # "Text file busy"); use /mnt/swapfile instead — /mnt is the large
      # ephemeral data disk on Azure-hosted runners (~14 GB free).
      - name: Add swap space
        run: |
          sudo fallocate -l 6G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "Memory + swap:"
          free -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      # ── System packages (mirrors Containerfile runtime stage) ───────────────
      # libasound2   — ALSA runtime lib; cpal (used by gestura) links against it
      # xz-utils     — required by npm packages (OpenCode, Auggie tarballs)
      # curl / git   — install script and gestura subcommand dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            bash \
            xz-utils \
            libasound2

      # ── Node.js 22 LTS via NodeSource (mirrors Containerfile exactly) ───────
      - name: Install Node.js 22 via NodeSource
        run: |
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
          sudo apt-get install -y --no-install-recommends nodejs
          node --version
          npm --version

      # ── Agent CLIs (same npm install command as Containerfile) ──────────────
      - name: Install agent CLIs via npm
        run: |
          sudo npm install -g \
            @anthropic-ai/claude-code \
            @augmentcode/auggie \
            @openai/codex \
            opencode-ai
          claude   --version
          auggie   --version
          codex    --version
          opencode --version

      # ── Gestura CLI via official install script (mirrors Containerfile) ─────
      - name: Install gestura CLI
        env:
          GESTURA_TAG: ${{ needs.setup.outputs.gestura_tag }}
        run: |
          set -euo pipefail
          echo "Installing gestura ${GESTURA_TAG}"
          curl -fsSL \
            https://raw.githubusercontent.com/gestura-ai/gestura-app/main/install/install.sh \
            | sudo bash -s -- --mode cli --tag "${GESTURA_TAG}" --require-verify
          which gestura
          gestura --version

      # ── Smoke-test gestura authentication directly ──────────────────────────
      - name: Smoke-test gestura authentication
        run: |
          set -euo pipefail
          _key="${GESTURA_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}"
          echo "Testing gestura auth (key length: ${#_key})"
          mkdir -p "${HOME}/.gestura"
          printf 'llm:\n  primary: anthropic\n  anthropic:\n    api_key: "%s"\n' "${_key}" \
            > "${HOME}/.gestura/config.yaml"
          gestura exec "Reply with only the single word: OK"

      # ── Scratch directory on /mnt (large ephemeral Azure disk) ─────────────────
      # Node.js CLIs (claude, opencode) write session logs, project caches, and
      # agentic-loop scratch files to $HOME on every invocation.  Over 126+
      # subprocess calls per profile this fills the 14 GB root partition.
      # The agent profiles redirect HOME and XDG dirs here via [subprocess.env],
      # so all CLI writes land on /mnt (~50 GB free after the 6 GB swapfile).
      - name: Create eval scratch directory on /mnt
        run: sudo install -d -o runner -g runner /mnt/eval-home

      # ── Pre-flight CLI validation ─────────────────────────────────────────────
      # Run a minimal prompt through each Node.js CLI before committing to the
      # full suite.  Catches broken CLI interfaces (changed flags, missing config,
      # first-run setup wizards) within 60 s rather than after 4+ hours of
      # 120 s-per-trial timeouts.  Non-fatal: the eval still runs and records
      # failures so the Pages report shows what broke.
      - name: Pre-flight CLI validation
        env:
          HOME: /mnt/eval-home
        run: |
          family="${{ matrix.family }}"
          ok=0
          case "$family" in
            claude-code)
              echo "=== pre-flight: claude-code ==="
              if timeout 60 claude --dangerously-skip-permissions -p \
                   "Reply with the single word: OK" 2>&1; then
                echo "claude-code: pre-flight OK"
                ok=1
              else
                echo "WARNING: claude-code pre-flight failed — check CLI version/flags"
                claude --version 2>&1 || true
              fi
              ;;
            opencode)
              echo "=== pre-flight: opencode ==="
              if timeout 60 opencode run --dangerously-skip-permissions \
                   --model "anthropic/claude-sonnet-4-6" \
                   "Reply with the single word: OK" 2>&1; then
                echo "opencode: pre-flight OK"
                ok=1
              else
                echo "WARNING: opencode pre-flight failed — check CLI version/flags"
                opencode --version 2>&1 || true
                opencode --help 2>&1 | head -30 || true
              fi
              ;;
            *)
              echo "=== pre-flight: $family (no CLI check needed) ==="
              ok=1
              ;;
          esac
          echo "pre-flight result: $ok"

      # ── Download pre-built binary (no Rust compilation in eval jobs) ─────────
      - name: Download agent-eval binary
        uses: actions/download-artifact@v4
        with:
          name: agent-eval-binary
          path: ./bin

      - name: Make agent-eval executable
        run: chmod +x ./bin/agent-eval

      # ── Run this family's evaluation ─────────────────────────────────────────
      - name: Run evaluation suite
        run: |
          set -euo pipefail
          mkdir -p eval-results
          ./bin/agent-eval suite \
            --families "${{ matrix.family }}" \
            --format json \
            --output-dir eval-results \
            --trials     "${{ needs.setup.outputs.trials }}" \
            --variation-delay-ms "${{ needs.setup.outputs.delay }}"

      # ── Upload JSON results — aggregate job merges them later ───────────────
      # Runs even on eval failure so partial results are preserved.
      - name: Upload per-family results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ matrix.family }}
          path: eval-results/*.json
          if-no-files-found: warn

  # ── Merge per-family JSON files into a single comparison report ───────────────
  aggregate:
    name: Aggregate results
    needs: [setup, build, run-eval]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Download agent-eval binary
        uses: actions/download-artifact@v4
        with:
          name: agent-eval-binary
          path: ./bin

      - name: Make agent-eval executable
        run: chmod +x ./bin/agent-eval

      # ── Collect all per-family JSON artifacts into one directory ─────────────
      - name: Download per-family results
        uses: actions/download-artifact@v4
        with:
          pattern: eval-reports-*
          path: all-reports
          merge-multiple: true

      # ── Generate HTML dashboard + combined JSON from all family results ───────
      - name: Generate comparison report
        run: |
          set -euo pipefail
          mkdir -p pages-output
          ./bin/agent-eval report \
            --from all-reports \
            --format all \
            --output-dir pages-output

      # ── Prepare GitHub Pages artifact ───────────────────────────────────────
      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          touch pages-output/.nojekyll

          if [ ! -f pages-output/index.html ]; then
            html_file="$(find pages-output -maxdepth 1 -name '*.html' | sort | head -1)"
            if [ -n "$html_file" ]; then
              cp "$html_file" pages-output/index.html
              echo "Promoted ${html_file} → pages-output/index.html"
            else
              python3 - <<'PY'
          from pathlib import Path

          out = Path("pages-output")
          files = sorted(
              f.name for f in out.iterdir()
              if f.is_file() and f.suffix in (".json", ".html") and f.name != "index.html"
          )
          rows = "\n".join(f'<li><a href="./{f}">{f}</a></li>' for f in files)

          (out / "index.html").write_text(
              f"""<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Agent Evaluation Results</title>
              <style>
                :root {{ color-scheme: light dark; }}
                body {{
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  margin: 2rem auto; max-width: 52rem; line-height: 1.6; padding: 0 1rem;
                }}
              </style>
            </head>
            <body>
              <h1>Agent Evaluation Results</h1>
              <ul>{rows}</ul>
            </body>
          </html>""",
              encoding="utf-8",
          )
          PY
            fi
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Eval Pages artifact"
            echo
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| Trigger   | \`${{ github.event_name }}\` |"
            echo "| Families  | \`${{ github.event.inputs.families || 'gestura,claude-code,opencode' }}\` |"
            echo "| Trials    | \`${{ needs.setup.outputs.trials }}\` |"
            echo "| Delay ms  | \`${{ needs.setup.outputs.delay }}\` |"
            echo
            echo "### Generated files"
            echo
            find pages-output -maxdepth 1 -type f | sort | \
              sed 's|^pages-output/||' | awk '{print "- `" $0 "`"}'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

  # ── Deploy to GitHub Pages ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: aggregate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
