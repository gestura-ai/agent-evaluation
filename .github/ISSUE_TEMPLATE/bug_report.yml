name: Bug Report
description: Report a bug in the agent evaluation harness
title: "[Bug]: "
labels: ["bug", "needs-triage"]

body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this bug has not been reported
          required: true
        - label: I can reproduce this with the latest release
          required: true

  - type: input
    id: version
    attributes:
      label: agent-eval version
      placeholder: "e.g. v0.1.0 (run: agent-eval --version)"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux x86_64
        - Windows x86_64
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Evaluation runner (cli_runner)
        - Rule-based evaluator
        - LLM-as-judge
        - HTML report generation
        - Config / agent profiles
        - CLI interface
        - Multi-agent suite
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      placeholder: What happened and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. agent-eval --agent ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Run with `RUST_LOG=debug` for verbose output.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
