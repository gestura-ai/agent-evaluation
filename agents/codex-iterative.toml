# ─────────────────────────────────────────────────────────────────────────────
# agents/codex-iterative.toml — Codex CLI (OpenAI) · Iterative Approval
#
# Mode: ITERATIVE
# Framework: OpenAI Codex CLI   https://github.com/openai/codex
# Binary: codex   Install: npm i -g @openai/codex
#
# Iterative profile: non-interactive exec mode with a read-only sandbox.
# The agent cannot execute shell commands or write files, focusing purely on
# reasoning and analysis output — analogous to the "suggest / propose" intent
# of the old approval-mode. All tool calls are blocked at the sandbox level
# so no approval gate is needed.
#
# Invocation: codex exec --skip-git-repo-check --sandbox read-only --model gpt-5.4 "<prompt>"
#   exec                          non-interactive subcommand
#   --skip-git-repo-check         skip git repo check (required in eval containers)
#   --sandbox read-only           block all shell execution and file writes
#   --model                       pin the model version
#
# ── Authentication ─────────────────────────────────────────────────────────────
# See codex-full.toml for the full Responses API auth requirement and curl
# verification command. Same OPENAI_API_KEY access level is required here.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "codex-iterative"
name        = "Codex CLI (OpenAI) — Iterative Approval"
description = "OpenAI Codex · gpt-5.4, suggest-mode approval gates, step-by-step"
mode        = "iterative"
requires_manual_auth = true
auth_env_var         = "OPENAI_API_KEY"

[model]
provider    = "openai"
name        = "gpt-5.4"   # gpt-4.5 was a removed research preview; gpt-5.4 is stable
temperature = 0.7
max_tokens  = 16384

[permissions]
level           = "restricted"
tools_enabled   = true
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = ["file", "git", "code", "task"]
denied_tools    = ["shell", "screenshot", "screen_record"]

[execution]
max_iterations        = 5
timeout_secs          = 180
require_confirmation  = true
confirmation_response = "yes"
retries               = 1

[subprocess]
bin         = "codex"
args_prefix = [
  "exec",
  "-c", "forced_login_method=\"api\"",
  "-c", "cli_auth_credentials_store=\"file\"",
  "--skip-git-repo-check",
  "--sandbox", "read-only",
  "--model", "gpt-5.4",
]

[subprocess.env]
OPENAI_MODEL = "gpt-5.4"

[thresholds]
min_variation_score    = 0.75
min_scenario_pass_rate = 0.67
min_overall_score      = 0.75

# ─── Scenario overrides ──────────────────────────────────────────────────────

[scenarios.s1_simple_query.variation_overrides.v3]
additional_checks = ["acknowledges_uncertainty"]

[scenarios.s3_planning.variation_overrides.v1]
additional_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
additional_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v3]
additional_checks = ["has_verification_step"]

[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test", "root_cause_explained"]

[scenarios.s7_context_retention.variation_overrides.v1]
additional_checks = ["no_invented_detail"]

[scenarios.s7_context_retention.variation_overrides.v2]
additional_checks = ["no_invented_detail"]

[scenarios.s7_context_retention.variation_overrides.v3]
additional_checks = ["no_invented_detail"]

