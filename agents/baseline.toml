# ─────────────────────────────────────────────────────────────────────────────
# agents/baseline.toml — Universal eval baseline
#
# This file is the single source of truth for all default values.
# Agent-specific profiles declare only what differs from this baseline.
# All fields here must have a valid value — nothing is optional at the baseline level.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "baseline"
name        = "Baseline"
description = "Universal default standards shared by every agent profile"
mode        = "autonomous"

# ─── Model ───────────────────────────────────────────────────────────────────
# Agents override this to match the model they actually run.

[model]
provider    = "anthropic"
name        = "claude-sonnet-4-6"
temperature = 0.7
max_tokens  = 8192

# ─── Permissions ─────────────────────────────────────────────────────────────
# Baseline is conservative: no tools, no shell, no network, no writes.
# Full-permission and iterative profiles open this up selectively.

[permissions]
level           = "restricted"
tools_enabled   = false
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = []
denied_tools    = []

# ─── Execution ───────────────────────────────────────────────────────────────

[execution]
max_iterations        = 1
timeout_secs          = 60
require_confirmation  = false
confirmation_response = "yes"
# Retry up to 5 times on rate-limit (429) errors before marking a variation
# failed.  Each retry waits rate_limit_backoff_secs × 2^(attempt-1), capped at 8×:
#   1st retry: 30 s  |  2nd: 60 s  |  3rd: 120 s  |  4th–5th: 240 s
retries                     = 5
rate_limit_backoff_secs     = 30
# Minimum pause inserted after every variation call (milliseconds).
# 2 000 ms keeps the per-minute token rate well below the 30 K TPM limit for
# most prompt sizes. Override at runtime with --variation-delay-ms.
delay_between_variations_ms = 2000
# Run each variation this many times and average the scores (majority-vote pass/fail).
# 1 = fast single-trial runs. Use 3-5 for statistically reliable benchmarks.
# Override at runtime with --trials N.
trials = 1

# ─── Subprocess ──────────────────────────────────────────────────────────────
# args_prefix is prepended to every invocation: `gestura exec "<prompt>"`.

[subprocess]
args_prefix = ["exec"]

[subprocess.env]
GESTURA_DISABLE_KEYCHAIN = "1"

# ─── Thresholds ──────────────────────────────────────────────────────────────
# Baseline demands high quality: 80% of checks must pass per variation,
# all variations must pass per scenario, and overall score ≥ 80%.

[thresholds]
min_variation_score   = 0.80
min_scenario_pass_rate = 1.0
min_overall_score     = 0.80

# ─── Scenario overrides ───────────────────────────────────────────────────────
# Baseline defines no overrides — all scenarios run with their built-in rubric.
# Agent profiles add overrides here to tune expectations for their execution mode.

