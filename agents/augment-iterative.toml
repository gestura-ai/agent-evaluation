# ─────────────────────────────────────────────────────────────────────────────
# agents/augment-iterative.toml — Augment (Auggie) · Iterative (Print mode)
#
# Mode: ITERATIVE
# Framework: Augment Code CLI (Auggie)   https://augmentcode.com/product/CLI
# Binary: auggie   (npm install -g @augmentcode/auggie — requires Node.js 22+)
#
# Iterative profile: uses --print (non-interactive) but with a restricted
# tool set. Auggie's --ask flag enables retrieval-only mode, limiting the
# agent to read-only tools (codebase-retrieval, web-fetch) and preventing
# any writes or shell execution — a close approximation of "approval-required"
# workflow behaviour without needing to pipe stdin confirmations.
#
# Auth: set AUGMENT_SESSION_AUTH (see augment-full.toml for instructions).
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "augment-iterative"
name        = "Augment (Auggie) — Iterative Approval"
description = "Augment Code agent · claude-sonnet-4-6, confirmation-gated workflow"
mode        = "iterative"
requires_manual_auth = true
auth_env_var         = "AUGMENT_SESSION_AUTH"

[model]
provider    = "anthropic"
name        = "claude-sonnet-4-6"
temperature = 0.5
max_tokens  = 8192

[permissions]
level           = "restricted"
tools_enabled   = true
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = ["file", "git", "code", "task"]
denied_tools    = ["shell", "screenshot", "screen_record"]

[execution]
max_iterations        = 5
timeout_secs          = 180
require_confirmation  = true
confirmation_response = "yes"
retries               = 1

[subprocess]
bin         = "auggie"
# --ask   enables ask mode: only retrieval and non-editing tools are active.
# --print exits after the single response (no interactive loop).
args_prefix = ["--ask", "--print"]
response_strip_prefix = "assistant:"

[subprocess.env]
AUGMENT_DISABLE_AUTO_UPDATE = "1"

[thresholds]
min_variation_score    = 0.75
min_scenario_pass_rate = 0.67
min_overall_score      = 0.75

# ─── Scenario overrides ───────────────────────────────────────────────────────

[scenarios.s1_simple_query.variation_overrides.v3]
additional_checks = ["acknowledges_uncertainty"]

[scenarios.s3_planning.variation_overrides.v1]
additional_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
additional_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v3]
additional_checks = ["has_verification_step"]

[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test", "root_cause_explained"]

[scenarios.s7_context_retention.variation_overrides.v1]
additional_checks = ["no_invented_detail"]

[scenarios.s7_context_retention.variation_overrides.v2]
additional_checks = ["no_invented_detail"]

[scenarios.s7_context_retention.variation_overrides.v3]
additional_checks = ["no_invented_detail"]

