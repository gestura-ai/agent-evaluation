# ─────────────────────────────────────────────────────────────────────────────
# agents/gestura-full.toml — Gestura full-permission autonomous agent
#
# Mode: AUTONOMOUS
#
# This profile represents Gestura running with complete tool access and no
# human-in-the-loop gates. It is the appropriate profile for e2e integration
# tests, CI task completion benchmarks, and agentic automation workflows.
#
# Permissions: all tools enabled including shell and network.
# Confirmation: never required — agent completes objectives end-to-end.
# Model: claude-sonnet-4-6 — strongest reasoning for complex multi-step tasks.
# Thresholds: highest bar (0.85) since full-permission should produce the best output.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "gestura-full"
name        = "Gestura — Full Permission (Autonomous)"
description = "Unrestricted e2e agent: all tools, no confirmation gates"
mode        = "autonomous"

[model]
provider    = "anthropic"
name        = "claude-sonnet-4-6"
temperature = 0.7
max_tokens  = 8192

[permissions]
level           = "full"
tools_enabled   = true
shell_enabled   = true
network_enabled = true
write_enabled   = true
allowed_tools   = []   # empty = all tools permitted
denied_tools    = []

[execution]
max_iterations        = 10
timeout_secs          = 120
require_confirmation  = false
retries               = 1

[subprocess]
args_prefix = ["exec"]

[subprocess.env]
GESTURA_DISABLE_KEYCHAIN  = "1"
GESTURA_PERMISSION_LEVEL  = "full"
GESTURA_TOOLS_ENABLED     = "true"
GESTURA_SHELL_ENABLED     = "true"
ANTHROPIC_MODEL           = "claude-sonnet-4-6"

[thresholds]
min_variation_score    = 0.85
min_scenario_pass_rate = 1.0
min_overall_score      = 0.85

# ─── Scenario overrides ───────────────────────────────────────────────────────
# Full-permission agent should produce comprehensive planning responses.

[scenarios.s3_planning.variation_overrides.v1]
min_words = 120
additional_checks = ["has_structured_sections", "has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words = 100
additional_checks = ["has_structured_sections"]

[scenarios.s3_planning.variation_overrides.v3]
min_words = 100

# Full-permission agent should always explain root cause and provide a test.
[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test"]

[scenarios.s4_error_handling.variation_overrides.v2]
additional_checks = ["suggests_test"]

