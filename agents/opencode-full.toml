# ─────────────────────────────────────────────────────────────────────────────
# agents/opencode-full.toml — OpenCode · Full Permission (Autonomous)
#
# Mode: AUTONOMOUS
# Framework: OpenCode (open-source coding agent)
#   https://github.com/sst/opencode
# Binary: opencode   Install: npm i -g opencode-ai
#
# Full-permission profile: unrestricted tool access, autonomous task completion.
# OpenCode is model-agnostic; this profile pins to claude-sonnet-4-6 for
# consistency with the Anthropic-backed agent profiles.
#
# Invocation: opencode run --dangerously-skip-permissions --model anthropic/claude-sonnet-4-6 "<prompt>"
#   run                             non-interactive subcommand
#   --dangerously-skip-permissions  auto-approve all permission prompts
#   --model                         model in provider/model format
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "opencode-full"
name        = "OpenCode — Full Permission (Autonomous)"
description = "OpenCode · claude-sonnet-4-6, unrestricted e2e execution"
mode        = "autonomous"

[model]
provider    = "anthropic"
name        = "claude-sonnet-4-6"
temperature = 0.7
max_tokens  = 8192

[permissions]
level           = "full"
tools_enabled   = true
shell_enabled   = true
network_enabled = true
write_enabled   = true
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 10
timeout_secs          = 120
require_confirmation  = false
retries               = 1

[subprocess]
bin         = "opencode"
args_prefix = ["run", "--dangerously-skip-permissions", "--model", "anthropic/claude-sonnet-4-6"]

[subprocess.env]
ANTHROPIC_MODEL = "claude-sonnet-4-6"

[thresholds]
min_variation_score    = 0.85
min_scenario_pass_rate = 1.0
min_overall_score      = 0.85

# ─── Scenario overrides ──────────────────────────────────────────────────────

[scenarios.s3_planning.variation_overrides.v1]
min_words         = 120
additional_checks = ["has_structured_sections", "has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words         = 100
additional_checks = ["has_structured_sections"]

[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test", "root_cause_explained"]

[scenarios.s4_error_handling.variation_overrides.v2]
additional_checks = ["suggests_test"]

