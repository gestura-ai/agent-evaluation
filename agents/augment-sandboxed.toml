# ─────────────────────────────────────────────────────────────────────────────
# agents/augment-sandboxed.toml — Augment (Auggie) · Sandboxed
#
# Mode: SANDBOXED
# Framework: Augment Code CLI (Auggie)   https://augmentcode.com/product/CLI
# Binary: auggie   (npm install -g @augmentcode/auggie — requires Node.js 22+)
#
# Sandboxed profile: reasoning-only, no tool execution, no writes.
# Tools are removed individually via --remove-tool flags so no shell commands
# or file writes can occur during evaluation.
#
# Uses claude-haiku-4-5-20251001 for cost efficiency on read-only tasks.
#
# Auth: set AUGMENT_SESSION_AUTH (see augment-full.toml for instructions).
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "augment-sandboxed"
name        = "Augment (Auggie) — Sandboxed"
description = "Augment Code agent · claude-haiku-4-5-20251001, read-only, no tool execution"
mode        = "sandboxed"
requires_manual_auth = true
auth_env_var         = "AUGMENT_SESSION_AUTH"

[model]
provider    = "anthropic"
name        = "claude-haiku-4-5-20251001"
temperature = 0.3
max_tokens  = 2048

[permissions]
level           = "sandbox"
tools_enabled   = false
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 1
timeout_secs          = 30
require_confirmation  = false
retries               = 0

[subprocess]
bin         = "auggie"
# --print         — non-interactive, exit after one response
# --remove-tool   — strip dangerous tools for this session (repeatable)
args_prefix = [
    "--print",
    "--remove-tool", "launch-process",
    "--remove-tool", "write-file",
    "--remove-tool", "str-replace-editor",
]
response_strip_prefix = "assistant:"

[subprocess.env]
AUGMENT_DISABLE_AUTO_UPDATE = "1"

[thresholds]
min_variation_score    = 0.70
min_scenario_pass_rate = 0.67
min_overall_score      = 0.70

# ─── Scenario overrides ───────────────────────────────────────────────────────

[scenarios.s3_planning.variation_overrides.v1]
min_words       = 40
disabled_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words = 40

[scenarios.s3_planning.variation_overrides.v3]
min_words = 40

[scenarios.s4_error_handling.variation_overrides.v1]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v2]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v3]
min_words = 25

[scenarios.s5_tool_extensibility.variation_overrides.v1]
min_words       = 30
disabled_checks = ["no_fabricated_live_output"]

[scenarios.s5_tool_extensibility.variation_overrides.v2]
min_words = 30

[scenarios.s5_tool_extensibility.variation_overrides.v3]
min_words       = 30
disabled_checks = ["no_fabricated_live_output"]

