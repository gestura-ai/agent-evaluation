# ─────────────────────────────────────────────────────────────────────────────
# agents/gestura-sandboxed.toml — Gestura sandboxed (environment-safe) agent
#
# Mode: SANDBOXED
#
# This profile represents Gestura running in a fully isolated environment:
# no tool execution, no shell access, no network calls, no filesystem writes.
# It is the appropriate profile for:
#   - Evaluating responses to untrusted or adversarial inputs
#   - Read-only analysis tasks (summarisation, Q&A, code review)
#   - Environments where safety guarantees must be provable
#
# Because sandboxed responses are inherently more limited (no tool output,
# shorter answers, no external verification steps), thresholds are relaxed
# and length minimums are reduced across planning and extensibility scenarios.
#
# Model: claude-haiku-4-5-20251001 — fast, cost-efficient for read-only reasoning.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "gestura-sandboxed"
name        = "Gestura — Sandboxed (Environment-Safe)"
description = "No tools, no network, no writes — safe for untrusted inputs"
mode        = "sandboxed"

[model]
provider    = "anthropic"
name        = "claude-haiku-4-5-20251001"
temperature = 0.3
max_tokens  = 2048

[permissions]
level           = "sandbox"
tools_enabled   = false
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 1
timeout_secs          = 30
require_confirmation  = false
retries               = 0

[subprocess]
args_prefix = ["exec"]

[subprocess.env]
GESTURA_DISABLE_KEYCHAIN  = "1"
GESTURA_PERMISSION_LEVEL  = "sandbox"
GESTURA_TOOLS_ENABLED     = "false"
GESTURA_SHELL_ENABLED     = "false"
GESTURA_NETWORK_ENABLED   = "false"
ANTHROPIC_MODEL           = "claude-haiku-4-5-20251001"

[thresholds]
# Sandboxed answers are more limited — relax pass bar accordingly.
min_variation_score    = 0.70
min_scenario_pass_rate = 0.67   # 2 of 3 variations passing is acceptable
min_overall_score      = 0.70

# ─── Scenario overrides ───────────────────────────────────────────────────────
# Reduce length expectations since sandboxed responses have no tool output.
# Remove checks that require tool invocations or external verification steps.

[scenarios.s3_planning.variation_overrides.v1]
min_words = 40
disabled_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words = 40

[scenarios.s3_planning.variation_overrides.v3]
min_words = 40

[scenarios.s4_error_handling.variation_overrides.v1]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v2]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v3]
min_words = 25

# Tool extensibility scenario: sandboxed agent explains concepts only, no live demo.
[scenarios.s5_tool_extensibility.variation_overrides.v1]
min_words = 30
disabled_checks = ["no_fabricated_live_output"]

[scenarios.s5_tool_extensibility.variation_overrides.v2]
min_words = 30

[scenarios.s5_tool_extensibility.variation_overrides.v3]
min_words = 30
disabled_checks = ["no_fabricated_live_output"]

