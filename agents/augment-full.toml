# ─────────────────────────────────────────────────────────────────────────────
# agents/augment-full.toml — Augment (Auggie) · Full Permission (Autonomous)
#
# Mode: AUTONOMOUS
# Framework: Augment Code CLI (Auggie)   https://augmentcode.com/product/CLI
# Binary: auggie   (npm install -g @augmentcode/auggie — requires Node.js 22+)
#
# Auggie is backed by Anthropic Claude, so model parity with gestura-full
# and claude-code-full is maintained across Anthropic-backed agents.
#
# Full-permission profile: unrestricted tool access, autonomous task completion.
#
# Invocation: auggie --print "<prompt>"
#   --print (-p)   run one instruction non-interactively and print response then exit
#
# Auth (CI / container): set AUGMENT_SESSION_AUTH to the JSON blob from
#   auggie token print   (run once on an authenticated machine)
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "augment-full"
name        = "Augment (Auggie) — Full Permission (Autonomous)"
description = "Augment Code agent · claude-sonnet-4-6, unrestricted e2e execution"
mode        = "autonomous"
# Auggie uses an OAuth session token (AUGMENT_SESSION_AUTH), not a static API key.
# This profile is excluded from fully automated runs; use --dry-run to validate rubrics.
requires_manual_auth = true
auth_env_var         = "AUGMENT_SESSION_AUTH"

[model]
provider    = "anthropic"
name        = "claude-sonnet-4-6"   # Augment is backed by Anthropic Claude
temperature = 0.7
max_tokens  = 8192

[permissions]
level           = "full"
tools_enabled   = true
shell_enabled   = true
network_enabled = true
write_enabled   = true
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 10
timeout_secs          = 120
require_confirmation  = false
retries               = 1

[subprocess]
bin         = "auggie"
args_prefix = ["--print"]
# response_strip_prefix strips role-label prefixes (e.g. "assistant: ") that
# some agent CLIs emit before the actual response text.
response_strip_prefix = "assistant:"

[subprocess.env]
# AUGMENT_SESSION_AUTH is the primary credential for Auggie in CI.
# Obtain it by running `auggie token print` on an authenticated machine,
# then pass the JSON blob at runtime:
#   podman run --rm -e AUGMENT_SESSION_AUTH='{"token":...}' agent-eval --agent augment-full
#
# Disable automatic self-update checks in CI to avoid noise and rate limits.
AUGMENT_DISABLE_AUTO_UPDATE = "1"

[thresholds]
min_variation_score    = 0.85
min_scenario_pass_rate = 1.0
min_overall_score      = 0.85

# ─── Scenario overrides ───────────────────────────────────────────────────────

[scenarios.s3_planning.variation_overrides.v1]
min_words         = 120
additional_checks = ["has_structured_sections", "has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words         = 100
additional_checks = ["has_structured_sections"]

[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test", "root_cause_explained"]

