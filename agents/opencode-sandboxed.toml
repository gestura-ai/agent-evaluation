# ─────────────────────────────────────────────────────────────────────────────
# agents/opencode-sandboxed.toml — OpenCode · Sandboxed
#
# Mode: SANDBOXED
# Framework: OpenCode (open-source coding agent)
#   https://github.com/sst/opencode
# Binary: opencode   Install: npm i -g opencode-ai
#
# Sandboxed profile: read-only reasoning, no tool execution, no writes.
# Uses claude-haiku-4-5-20251001 for cost efficiency on isolated, read-only tasks.
#
# Invocation: opencode run --dangerously-skip-permissions --model anthropic/claude-haiku-4-5-20251001 "<prompt>"
#   run                             non-interactive subcommand
#   --dangerously-skip-permissions  auto-approve permission prompts
#   --model                         model in provider/model format (provider/model-id)
#
# NOTE: opencode has no --no-tools flag. Sandboxed behaviour is enforced by the
# eval rubric (tools_enabled=false) and by choosing a lightweight model here.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "opencode-sandboxed"
name        = "OpenCode — Sandboxed"
description = "OpenCode · claude-haiku-4-5-20251001, read-only reasoning, no tool execution"
mode        = "sandboxed"

[model]
provider    = "anthropic"
name        = "claude-haiku-4-5-20251001"
temperature = 0.3
max_tokens  = 2048

[permissions]
level           = "sandbox"
tools_enabled   = false
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 1
timeout_secs          = 30
require_confirmation  = false
retries               = 0

[subprocess]
bin         = "opencode"
args_prefix = ["run", "--dangerously-skip-permissions", "--model", "anthropic/claude-haiku-4-5-20251001"]

[subprocess.env]
ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"
HOME            = "/mnt/eval-home"
XDG_CACHE_HOME  = "/mnt/eval-home/.cache"
XDG_DATA_HOME   = "/mnt/eval-home/.local/share"
XDG_CONFIG_HOME = "/mnt/eval-home/.config"

[thresholds]
min_variation_score    = 0.70
min_scenario_pass_rate = 0.67
min_overall_score      = 0.70

# ─── Scenario overrides ──────────────────────────────────────────────────────

[scenarios.s3_planning.variation_overrides.v1]
min_words       = 40
disabled_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words = 40

[scenarios.s3_planning.variation_overrides.v3]
min_words = 40

[scenarios.s4_error_handling.variation_overrides.v1]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v2]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v3]
min_words = 25

[scenarios.s5_tool_extensibility.variation_overrides.v1]
min_words       = 30
disabled_checks = ["no_fabricated_live_output"]

[scenarios.s5_tool_extensibility.variation_overrides.v2]
min_words = 30

[scenarios.s5_tool_extensibility.variation_overrides.v3]
min_words       = 30
disabled_checks = ["no_fabricated_live_output"]

