# ─────────────────────────────────────────────────────────────────────────────
# agents/codex-full.toml — Codex CLI (OpenAI) · Full Permission (Autonomous)
#
# Mode: AUTONOMOUS
# Framework: OpenAI Codex CLI   https://github.com/openai/codex
# Binary: codex   Install: npm i -g @openai/codex
#
# Full-permission profile: non-interactive exec mode with workspace-write
# sandbox and no approval gates. The agent can read/write files in the
# working directory without pausing for confirmation.
#
# Invocation: codex exec --skip-git-repo-check --sandbox workspace-write --model gpt-5.4 "<prompt>"
#   exec                          non-interactive subcommand
#   --skip-git-repo-check         skip git repo check (required in eval containers)
#   --sandbox workspace-write     allow file writes in the workspace, block broader system access
#   --model                       pin the model version
#
# ── Authentication ─────────────────────────────────────────────────────────────
# Codex v0.120.0+ uses the OpenAI Responses API (wss://api.openai.com/v1/responses)
# exclusively — NOT the standard Chat Completions API (/v1/chat/completions).
# A key valid for chat completions will still 401 here if the account does not have
# Responses API access. On 401, codex exhausts 5 retries then exits with empty stdout;
# the 401 details appear only in stderr (pipeline_error in the eval report).
#
# Required env: OPENAI_API_KEY with Responses API access enabled on the account.
# Verify access: curl -s -o /dev/null -w "%{http_code}" \
#   -H "Authorization: Bearer $OPENAI_API_KEY" \
#   -H "Content-Type: application/json" \
#   -d '{"model":"gpt-5.4","input":"ping"}' \
#   https://api.openai.com/v1/responses
# Expected: 200  |  Got 401 → account needs Responses API access
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "codex-full"
name        = "Codex CLI (OpenAI) — Full Permission (Autonomous)"
description = "OpenAI Codex · gpt-5.4, full-auto approval, unrestricted execution"
mode        = "autonomous"
requires_manual_auth = true
auth_env_var         = "OPENAI_API_KEY"

[model]
provider    = "openai"
name        = "gpt-5.4"         # gpt-4.5 was a removed research preview; gpt-5.4 is stable
temperature = 1.0
max_tokens  = 16384

[permissions]
level           = "full"
tools_enabled   = true
shell_enabled   = true
network_enabled = true
write_enabled   = true
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 10
timeout_secs          = 120
require_confirmation  = false
retries               = 1

[subprocess]
bin         = "codex"
args_prefix = [
  "exec",
  "-c", "forced_login_method=\"api\"",
  "-c", "cli_auth_credentials_store=\"file\"",
  "--skip-git-repo-check",
  "--sandbox", "workspace-write",
  "--model", "gpt-5.4",
]

[subprocess.env]
# OPENAI_API_KEY authentication note:
#   Codex v0.120.0 reads its API key from ~/.codex/config.toml, NOT from the
#   OPENAI_API_KEY env var.  The env var sets provider selection but is not
#   forwarded to the Responses API WebSocket Authorization header.
#
#   entrypoint.sh (in the container image) writes a minimal config.toml from
#   OPENAI_API_KEY at startup, so no manual codex login is required.
#
#   To verify your key has Responses API access outside the container:
#     curl -s -o /dev/null -w "%{http_code}" \
#       -H "Authorization: Bearer $OPENAI_API_KEY" \
#       -H "Content-Type: application/json" \
#       -d '{"model":"gpt-5.4","input":"ping"}' \
#       https://api.openai.com/v1/responses
#   Expected: 200. If 401, the account needs Responses API access enabled.
OPENAI_MODEL = "gpt-5.4"

[thresholds]
min_variation_score    = 0.85
min_scenario_pass_rate = 1.0
min_overall_score      = 0.85

# ─── Scenario overrides ───────────────────────────────────────────────────────

[scenarios.s3_planning.variation_overrides.v1]
min_words         = 120
additional_checks = ["has_structured_sections", "has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words         = 100
additional_checks = ["has_structured_sections"]

[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test", "root_cause_explained"]

[scenarios.s4_error_handling.variation_overrides.v2]
additional_checks = ["suggests_test"]

