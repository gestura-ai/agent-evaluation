# ─────────────────────────────────────────────────────────────────────────────
# agents/codex-sandboxed.toml — Codex CLI (OpenAI) · Sandboxed
#
# Mode: SANDBOXED
# Framework: OpenAI Codex CLI   https://github.com/openai/codex
# Binary: codex   Install: npm i -g @openai/codex
#
# Sandboxed profile: read-only, reasoning-only. No shell execution, no file
# writes, no network calls. Uses gpt-5.4-mini for cost efficiency.
#
# Invocation: codex exec --skip-git-repo-check --sandbox read-only --model gpt-5.4-mini "<prompt>"
#   exec                          non-interactive subcommand
#   --skip-git-repo-check         skip git repo check (required in eval containers)
#   --sandbox read-only           hard block on all shell/write operations
#   --model                       pin the model version
#
# ── Authentication ─────────────────────────────────────────────────────────────
# See codex-full.toml for the full Responses API auth requirement and curl
# verification command. Same OPENAI_API_KEY access level is required here.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "codex-sandboxed"
name        = "Codex CLI (OpenAI) — Sandboxed"
description = "OpenAI Codex · gpt-5.4-mini, read-only reasoning, no tool execution"
mode        = "sandboxed"
requires_manual_auth = true
auth_env_var         = "OPENAI_API_KEY"

[model]
provider    = "openai"
name        = "gpt-5.4-mini"
temperature = 0.3
max_tokens  = 2048

[permissions]
level           = "sandbox"
tools_enabled   = false
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = []
denied_tools    = []

[execution]
max_iterations        = 1
timeout_secs          = 30
require_confirmation  = false
retries               = 0

[subprocess]
bin         = "codex"
args_prefix = [
  "exec",
  "-c", "forced_login_method=\"api\"",
  "-c", "cli_auth_credentials_store=\"file\"",
  "--skip-git-repo-check",
  "--sandbox", "read-only",
  "--model", "gpt-5.4-mini",
]

[subprocess.env]
OPENAI_MODEL = "gpt-5.4-mini"

[thresholds]
min_variation_score    = 0.70
min_scenario_pass_rate = 0.67
min_overall_score      = 0.70

# ─── Scenario overrides ──────────────────────────────────────────────────────

[scenarios.s3_planning.variation_overrides.v1]
min_words       = 40
disabled_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
min_words = 40

[scenarios.s3_planning.variation_overrides.v3]
min_words = 40

[scenarios.s4_error_handling.variation_overrides.v1]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v2]
min_words = 25

[scenarios.s4_error_handling.variation_overrides.v3]
min_words = 25

[scenarios.s5_tool_extensibility.variation_overrides.v1]
min_words       = 30
disabled_checks = ["no_fabricated_live_output"]

[scenarios.s5_tool_extensibility.variation_overrides.v2]
min_words = 30

[scenarios.s5_tool_extensibility.variation_overrides.v3]
min_words       = 30
disabled_checks = ["no_fabricated_live_output"]

