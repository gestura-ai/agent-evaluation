# ─────────────────────────────────────────────────────────────────────────────
# agents/opencode-iterative.toml — OpenCode · Iterative Approval
#
# Mode: ITERATIVE
# Framework: OpenCode (open-source coding agent)
#   https://github.com/sst/opencode
# Binary: opencode   Install: npm i -g opencode-ai
#
# Iterative profile: OpenCode pauses before side-effectful actions and requests
# confirmation. The eval runner sends `confirmation_response` ("yes") when the
# agent is waiting so the run can complete non-interactively.
#
# Invocation: opencode run --dangerously-skip-permissions --model anthropic/claude-sonnet-4-6 "<prompt>"
#   run                             non-interactive subcommand
#   --dangerously-skip-permissions  auto-approve permission prompts
#   --model                         model in provider/model format
#
# NOTE: opencode has no --interactive approval-gate flag. The iterative profile
# distinction is captured in the eval rubric (lower thresholds, additional checks)
# rather than in the CLI invocation.
# ─────────────────────────────────────────────────────────────────────────────

[agent]
id          = "opencode-iterative"
name        = "OpenCode — Iterative Approval"
description = "OpenCode · claude-sonnet-4-6, confirmation-gated, step-by-step"
mode        = "iterative"

[model]
provider    = "anthropic"
name        = "claude-sonnet-4-6"
temperature = 0.5
max_tokens  = 8192

[permissions]
level           = "restricted"
tools_enabled   = true
shell_enabled   = false
network_enabled = false
write_enabled   = false
allowed_tools   = ["file", "git", "code", "task"]
denied_tools    = ["shell", "screenshot", "screen_record"]

[execution]
max_iterations        = 5
timeout_secs          = 180
require_confirmation  = true
confirmation_response = "yes"
retries               = 1

[subprocess]
bin         = "opencode"
args_prefix = ["run", "--dangerously-skip-permissions", "--model", "anthropic/claude-sonnet-4-6"]

[subprocess.env]
ANTHROPIC_MODEL = "claude-sonnet-4-6"

[thresholds]
min_variation_score    = 0.75
min_scenario_pass_rate = 0.67
min_overall_score      = 0.75

# ─── Scenario overrides ──────────────────────────────────────────────────────

[scenarios.s1_simple_query.variation_overrides.v3]
additional_checks = ["acknowledges_uncertainty"]

[scenarios.s3_planning.variation_overrides.v1]
additional_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v2]
additional_checks = ["has_verification_step"]

[scenarios.s3_planning.variation_overrides.v3]
additional_checks = ["has_verification_step"]

[scenarios.s4_error_handling.variation_overrides.v1]
additional_checks = ["suggests_test", "root_cause_explained"]

[scenarios.s7_context_retention.variation_overrides.v1]
additional_checks = ["no_invented_detail"]

[scenarios.s7_context_retention.variation_overrides.v2]
additional_checks = ["no_invented_detail"]

[scenarios.s7_context_retention.variation_overrides.v3]
additional_checks = ["no_invented_detail"]

